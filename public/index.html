<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jinnie Chat</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <!-- Username Modal -->
  <div id="username-modal" class="modal">
    <div class="modal-content">
      <h3>Enter your name</h3>
      <input type="text" id="username-input" placeholder="Your name">
      <button id="username-btn">Join</button>
    </div>
  </div>

  <!-- Room Modal -->
  <div id="room-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Select or Create a Room</h3>
      <ul id="room-list"></ul>
      <input type="text" id="new-room-input" placeholder="New room name">
      <button id="new-room-btn">Create & Join</button>
    </div>
  </div>

  <!-- Chat Container -->
  <div class="chat-container hidden">
    <div class="chat-header">
      <span id="chat-title">Jinnie Chat</span>
    </div>
    <div id="status-bar" class="status-bar hidden"></div>
    <div class="chat-body" id="chat-body"></div>
    <div id="typing-indicator" class="typing-indicator hidden"></div>
    <div class="chat-footer">
      <input type="text" id="message-input" placeholder="Type a message">
      <div class="chat-buttons">
        <button id="file-btn">📎</button>
        <input type="file" id="file-input" hidden>
        <button id="send-btn">➤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
